<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Operations Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;450;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --surface-2: #f1f4f8;
      --ink: #14181d;
      --ink-soft: #3c4654;
      --muted: #616b78;
      --faint: #8a939f;
      --border: #e1e6ed;
      --line: #d7dde6;
      --accent: #1366d6;
      --accent-strong: #0f51ab;
      --accent-soft: rgba(19,102,214,0.09);
      --brand: #C9A34D;
      --glow: rgba(19,102,214,0.07);
      --warn: #9a6700;
      --warn-bg: rgba(180,130,0,0.10);
      --warn-border: rgba(180,130,0,0.42);
      --shadow-sm: 0 1px 2px rgba(20,30,45,0.05);
      --shadow: 0 1px 2px rgba(20,30,45,0.05), 0 10px 30px rgba(20,30,45,0.07);
      --shadow-lg: 0 2px 4px rgba(20,30,45,0.07), 0 18px 44px rgba(20,30,45,0.12);
      --sans: "IBM Plex Sans", "Segoe UI", system-ui, -apple-system, sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0f14;
        --surface: #151a21;
        --surface-2: #1b212a;
        --ink: #e8eef5;
        --muted: #9aa4b1;
        --faint: #6b7682;
        --border: #262d37;
        --line: #2b323d;
        --accent: #4a9eff;
        --accent-strong: #7bb8ff;
        --accent-soft: rgba(74,158,255,0.13);
        --brand: #C9A34D;
        --glow: rgba(74,158,255,0.09);
        --warn: #e3b341;
        --warn-bg: rgba(227,179,65,0.10);
        --warn-border: rgba(227,179,65,0.40);
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
        --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 10px 30px rgba(0,0,0,0.45);
        --shadow-lg: 0 2px 4px rgba(0,0,0,0.5), 0 18px 44px rgba(0,0,0,0.55);
      }
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--sans);
      color: var(--ink);
      margin: 0;
      padding: 0 20px 64px;
      min-height: 100vh;
      background:
        radial-gradient(1100px 520px at 50% -8%, var(--glow), transparent 70%),
        var(--bg);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap { max-width: 940px; margin: 0 auto; }

    /* ---------- Header ---------- */
    header.top {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 34px 2px 26px;
    }
    .mark { flex: 0 0 auto; color: var(--accent); }
    .top .title { flex: 1 1 auto; line-height: 1.1; }
    .top .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
      margin: 0 0 4px;
    }
    .top h1 {
      margin: 0;
      font-size: 25px;
      font-weight: 600;
      letter-spacing: -0.015em;
    }
    .top .tag {
      margin: 5px 0 0;
      font-size: 13.5px;
      color: var(--muted);
    }
    .top .today {
      flex: 0 0 auto;
      align-self: flex-start;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      padding: 6px 11px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      white-space: nowrap;
    }

    /* ---------- Flow spine ---------- */
    .flow {
      position: relative;
      padding-left: 58px;
    }
    .flow::before {
      content: "";
      position: absolute;
      left: 28px;
      top: 14px;
      bottom: 18px;
      width: 2px;
      background: var(--brand);
      opacity: 0.6;
    }

    .block { position: relative; margin-bottom: 34px; }
    .block:last-child { margin-bottom: 0; }

    .block-head { display: flex; align-items: center; gap: 14px; margin-bottom: 15px; }
    .node {
      position: absolute;
      left: -44px;
      top: -1px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      background: var(--surface);
      border: 2px solid var(--brand);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
    }
    .block-title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .blurb { margin: 1px 0 0; font-size: 13px; color: var(--muted); }
    .block-head-text { display: flex; flex-direction: column; }

    /* ---------- Command cards (Find) ---------- */
    .cards { display: flex; flex-direction: column; gap: 14px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 18px 18px 16px;
      position: relative;
    }
    .card-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label .dest { color: var(--accent); }

    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .field { flex: 1 1 170px; min-width: 0; }
    .field.full { flex: 1 1 100%; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin: 0 0 5px;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 11px 12px;
      font-size: 15px;
      font-family: var(--sans);
      background: var(--surface-2);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 9px;
      transition: border-color .14s ease, box-shadow .14s ease;
    }
    input[type="text"] { font-family: var(--mono); font-size: 14px; letter-spacing: 0.01em; }
    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .checkbox { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; }
    .checkbox input { width: auto; accent-color: var(--accent); }

    button.go {
      appearance: none; border: none;
      background: var(--accent); color: #fff;
      font-family: var(--sans); font-size: 14px; font-weight: 600;
      padding: 11px 22px; border-radius: 9px; cursor: pointer;
      transition: background .14s ease, transform .1s ease;
    }
    button.go:hover { background: var(--accent-strong); }
    button.go:active { transform: translateY(1px); }
    button.go:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .search-note { margin: 9px 0 0; font-size: 12px; color: var(--muted); }
    .search-note.warn { color: var(--warn); font-weight: 500; }

    /* recent */
    .recent { margin-top: 15px; }
    .recent-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
    .recent-head .t { font-family: var(--mono); font-size: 10.5px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); }
    .linkbtn { background: none; border: none; padding: 0; cursor: pointer; color: var(--muted); font-size: 12px; text-decoration: underline; font-family: var(--sans); }
    .linkbtn:hover { color: var(--ink); }
    #recentList { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex; align-items: center; gap: 9px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 13px; cursor: pointer;
      font-family: var(--mono); font-size: 13px; color: var(--ink);
      transition: border-color .14s ease;
    }
    .chip:hover { border-color: var(--accent); }
    .chip .badge { font-family: var(--sans); font-size: 10px; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; }

    /* ---------- Tool tiles ---------- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(212px, 1fr)); gap: 12px; }
    .tile {
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; gap: 9px;
      min-height: 88px; padding: 15px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 13px; box-shadow: var(--shadow);
      text-decoration: none; color: var(--ink);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .tile::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent); opacity: 0; transition: opacity .15s ease;
    }
    .tile:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: var(--shadow-lg); }
    .tile:hover::before { opacity: 1; }
    .tile:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .tile-top { display: flex; align-items: center; gap: 8px; }
    .tile-name { font-size: 14.5px; font-weight: 600; letter-spacing: -0.005em; }
    .tile-arrow { margin-left: auto; color: var(--faint); transition: transform .15s ease, color .15s ease; }
    .tile:hover .tile-arrow { color: var(--accent); transform: translate(2px,-2px); }
    .tile-desc { font-size: 12.5px; color: var(--muted); line-height: 1.4; }

    .tile.unset { border-style: dashed; box-shadow: none; cursor: default; background: var(--surface-2); }
    .tile.unset:hover { transform: none; box-shadow: none; border-color: var(--warn-border); }
    .tile.unset.is-soon:hover { border-color: var(--line); }
    .tile.unset .tile-name { color: var(--muted); }

    .tile.cta {
      grid-column: 1 / -1;
      gap: 11px;
      padding: 18px 20px;
    }
    .tile.cta .tile-name { font-size: 16px; }
    .tile.cta .tile-desc { font-size: 13px; line-height: 1.55; max-width: 66ch; }
    .cta-go {
      align-self: flex-start;
      margin-top: 4px;
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--sans); font-size: 13px; font-weight: 600;
      color: #fff; background: var(--accent);
      padding: 9px 16px; border-radius: 9px;
      transition: background .14s ease;
    }
    .tile.cta:hover .cta-go { background: var(--accent-strong); }

    .pill {
      align-self: flex-start; margin-top: 2px;
      font-family: var(--mono); font-size: 10.5px; font-weight: 500; letter-spacing: .02em;
      color: var(--warn); background: var(--warn-bg);
      border: 1px solid var(--warn-border); border-radius: 999px; padding: 3px 9px;
    }
    .pill.soon { color: var(--muted); background: var(--surface-2); border-color: var(--line); }

    /* ---------- Footer ---------- */
    footer.note {
      margin: 40px 0 0; padding-top: 18px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--faint); line-height: 1.55;
    }
    footer.note code { font-family: var(--mono); background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 11px; }

    /* ---------- Motion ---------- */
    @media (prefers-reduced-motion: no-preference) {
      .reveal { opacity: 0; transform: translateY(10px); animation: rise .5s cubic-bezier(.22,.61,.36,1) forwards; }
      @keyframes rise { to { opacity: 1; transform: none; } }
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 560px) {
      body { padding: 0 14px 48px; }
      header.top { padding-top: 24px; gap: 12px; flex-wrap: wrap; }
      .top .today { order: 3; }
      .flow { padding-left: 0; }
      .flow::before { display: none; }
      .node { position: static; }
      .block-head { gap: 11px; }
      .field { flex: 1 1 100%; }
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <header class="top reveal">
      <svg class="mark" width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Quality Precision Cleaning logo">
        <circle cx="50" cy="50" r="48" fill="#C9A34D"/>
        <g transform="translate(8.95,7.1) scale(0.3636)" fill="#1F2937" stroke="#1F2937" stroke-width="3" stroke-linejoin="miter" stroke-miterlimit="10">
          <polyline points="85.61 150.21 74.4 150.21 68.66 144.17 37 144.25 24.9 132.57 24.9 97.86 36.58 86.27 71.37 86.27 82.38 97.61 82.63 131.89 79.67 135.45 74.08 129.88 75.1 129.02 75.02 100.81 67.87 93.58 39.73 93.58 32.5 100.96 32.66 129.41 39.97 136.88 61.35 136.88 53.17 127.49 63.84 127.49 85.79 150.21"/>
          <path d="M135.59,86.19h-42.48v57.86h7.51v-17.64h35.04l10.64-10.56v-18.97l-10.71-10.69ZM138.62,112.49l-5.98,6.52h-31.72v-25h31.78l5.92,5.72v12.77Z" fill-rule="evenodd"/>
          <polygon points="200.84 86.23 200.85 93.97 167.82 93.97 160.38 101.35 160.38 129.37 167.42 136.64 200.76 136.64 200.9 144.01 165.03 144.01 152.88 132.82 152.88 97.98 164.76 86.23 200.84 86.23"/>
        </g>
      </svg>
      <div class="title">
        <p class="eyebrow">Quality Precision Cleaning</p>
        <h1>Operations Center</h1>
        <p class="tag">Find. Open. Move.</p>
      </div>
      <div class="today" id="today"></div>
    </header>

    <div class="flow">

      <!-- ===== 01 FIND ===== -->
      <section class="block reveal" style="animation-delay:.06s">
        <div class="block-head">
          <span class="node">01</span>
          <div class="block-head-text">
            <h2 class="block-title">Find</h2>
          </div>
        </div>
        <div class="cards">

          <div class="card">
            <p class="card-label">Search <span class="dest">→ Viva Engage</span></p>
            <div class="row">
              <div class="field">
                <label for="department">Group</label>
                <select id="department"></select>
              </div>
              <div class="field">
                <label for="partNumber">Part Number</label>
                <input type="text" id="partNumber" placeholder="000-158-9514-001" autocomplete="off"
                       autocapitalize="off" autocorrect="off" spellcheck="false" />
              </div>
              <div class="field">
                <label for="workOrder">Work Order #</label>
                <input type="text" id="workOrder" placeholder="48217" autocomplete="off"
                       inputmode="numeric" autocapitalize="off" autocorrect="off" spellcheck="false" />
              </div>
            </div>
            <div class="controls">
              <label class="checkbox">
                <input type="checkbox" id="exactMatch" checked /> Exact match
              </label>
              <button class="go" id="searchBtn">Search</button>
            </div>
            <p class="search-note" id="searchNote">On: exact phrase. Off: looser match for spacing or format variants.</p>
            <div class="recent" id="recentWrap" hidden>
              <div class="recent-head">
                <span class="t">Recent</span>
                <button type="button" id="clearRecent" class="linkbtn">Clear</button>
              </div>
              <ul id="recentList"></ul>
            </div>
          </div>

        </div>
      </section>

      <!-- ===== rendered sections 02+ ===== -->
      <div id="sections"></div>

    </div>

    <!-- To add or fix a link, edit the TOOLS list at the top of the script below.
         Empty url => "Set link" pill.  soon:true => "Coming soon" pill. -->

  </div>

  <script>
    /* =================================================================
       EDIT LINKS HERE.  Each item: { name, desc, url[, soon] }.
       Empty url -> "Set link".  soon:true -> "Coming soon".
       ================================================================= */
    const TOOLS = [
      {
        section: "Production",
        blurb: "",
        items: [
          { name: "Production List", desc: "Every job and its status.", url: "https://qpctcom-my.sharepoint.com/:l:/g/personal/tyler_qpct_com/JAAr9Pp0AsqlT5uf_J3mzJfCAZNwYfW41TSv_LQksztnw7w?e=8vlHFZ" },
          { name: "Production Pulse", desc: "The health of production, right now.", url: "https://whaatmoney.github.io/schedule/" },
          { name: "OTD Tracker",     desc: "", soon: true, url: "" }
        ]
      },
      {
        section: "Quality",
        blurb: "",
        items: [
          { name: "Insights",    desc: "How QPC sees what's really going on. Anyone can add.", url: "https://forms.office.com/r/Jyga0TwbDm?origin=lprLink" },
          { name: "Escalations", desc: "See what's escalated and where it stands.", url: "https://engage.cloud.microsoft/main/groups/eyJfdHlwZSI6Ikdyb3VwIiwiaWQiOiIyNDc2MzQ2NDkwODgifQ/all" }
        ]
      },
      {
        section: "Tools & Utilities",
        blurb: "",
        items: [
          { name: "Surface Area Calculator", desc: "Calculate a part's surface area.", url: "https://whaatmoney.github.io/sa/" },
          { name: "Part Number History", desc: "Full detail on any part number.", url: "https://whaatmoney.github.io/pricing/" }
        ]
      },
      {
        section: "Reference",
        blurb: "",
        items: [
          { name: "Router Forms",      desc: "", soon: true, url: "" },
          { name: "Training Material", desc: "", soon: true, url: "" }
        ]
      }
    ];

    /* ---------------- Part / job search ---------------- */
    const DEPARTMENTS = [
      { key: "all",        label: "All groups",            groupId: null },
      { key: "inspection", label: "Inspection",           groupId: "14999188" },
      { key: "ncr",        label: "NCR",                   groupId: "14824878" },
      { key: "packaging",  label: "Packaging Inspection",  groupId: "15414084" }
    ];

    const SEARCH_BASE   = "https://engage.cloud.microsoft/main/search";
    const RECENT_KEY    = "pnwiki:recent";
    const LAST_DEPT_KEY = "pnwiki:lastDept";
    const MAX_RECENT    = 10;

    const dropdown   = document.getElementById("department");
    const input      = document.getElementById("partNumber");
    const woInput    = document.getElementById("workOrder");
    const exactBox   = document.getElementById("exactMatch");
    const button     = document.getElementById("searchBtn");
    const recentWrap = document.getElementById("recentWrap");
    const recentList = document.getElementById("recentList");
    const clearBtn   = document.getElementById("clearRecent");
    const searchNote = document.getElementById("searchNote");
    const NOTE_DEFAULT = searchNote.textContent;
    function resetNote(){ searchNote.textContent = NOTE_DEFAULT; searchNote.classList.remove("warn"); }

    function storageGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
    function storageSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
    function getRecent(){ try { const r = storageGet(RECENT_KEY); const a = r ? JSON.parse(r) : []; return Array.isArray(a)?a:[]; } catch(e){ return []; } }
    function saveRecent(a){ storageSet(RECENT_KEY, JSON.stringify(a)); }
    function deptByKey(k){ return DEPARTMENTS.find(d=>d.key===k)||null; }
    function deptLabel(k){ const d=deptByKey(k); return d?d.label:k; }

    function buildUrl(deptKey, pn, wo, exact){
      const dept = deptByKey(deptKey);
      if (!dept) return null;
      const terms = [pn, wo].map(t => (t||"").trim()).filter(t => t !== "");
      if (terms.length === 0) return null;
      const search = terms.map(t => exact ? `"${t}"` : t).join(" ");
      let url = SEARCH_BASE + "?search=" + encodeURIComponent(search) + "&type=threads";
      if (dept.groupId) {
        const scope = btoa(JSON.stringify({ _type:"Group", id: dept.groupId }));
        url += "&groupScope=" + encodeURIComponent(scope);
      }
      return url;
    }

    function launchSearch(){
      const pn = input.value.trim();
      const wo = woInput.value.trim();
      if (pn === "" && wo === "") {
        searchNote.textContent = "Enter a part number or work order.";
        searchNote.classList.add("warn");
        input.focus();
        return;
      }
      resetNote();
      const deptKey = dropdown.value;
      const exact = exactBox.checked;
      const url = buildUrl(deptKey, pn, wo, exact);
      if (!url) return;
      storageSet(LAST_DEPT_KEY, deptKey);
      addRecent(pn, wo, deptKey, exact);
      window.open(url, "_blank", "noopener");
    }

    function addRecent(pn, wo, deptKey, exact){
      let recent = getRecent().filter(r => !(r.pn===pn && r.wo===wo && r.dept===deptKey));
      recent.unshift({ pn:pn, wo:wo, dept:deptKey, exact:exact });
      recent = recent.slice(0, MAX_RECENT);
      saveRecent(recent);
      renderRecent();
    }

    function renderRecent(){
      const recent = getRecent();
      recentList.textContent = "";
      if (recent.length === 0){ recentWrap.hidden = true; return; }
      recentWrap.hidden = false;
      recent.forEach(r => {
        const li = document.createElement("li");
        const chip = document.createElement("button");
        chip.type = "button"; chip.className = "chip";
        const terms = document.createElement("span");
        terms.textContent = [r.pn, r.wo].filter(Boolean).join("  \u00b7  ");
        const badge = document.createElement("span");
        badge.className = "badge"; badge.textContent = deptLabel(r.dept);
        chip.appendChild(terms); chip.appendChild(badge);
        chip.addEventListener("click", () => {
          input.value = r.pn || "";
          woInput.value = r.wo || "";
          if (deptByKey(r.dept)) dropdown.value = r.dept;
          exactBox.checked = (r.exact !== false);
          launchSearch();
        });
        li.appendChild(chip); recentList.appendChild(li);
      });
    }

    DEPARTMENTS.forEach(d => {
      const o = document.createElement("option");
      o.value = d.key; o.textContent = d.label; dropdown.appendChild(o);
    });
    const lastDept = storageGet(LAST_DEPT_KEY);
    if (lastDept && deptByKey(lastDept)) dropdown.value = lastDept;
    renderRecent();

    function onEnter(e){ if (e.key === "Enter"){ e.preventDefault(); launchSearch(); } }
    input.addEventListener("keydown", onEnter);
    woInput.addEventListener("keydown", onEnter);
    input.addEventListener("input", resetNote);
    woInput.addEventListener("input", resetNote);
    button.addEventListener("click", launchSearch);
    clearBtn.addEventListener("click", () => { saveRecent([]); renderRecent(); });

    /* ---------------- Date ---------------- */
    const dateEl = document.getElementById("today");
    if (dateEl) dateEl.textContent = new Date().toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" });

    /* ---------------- Tool tiles ---------------- */
    const ARROW = '<svg class="tile-arrow" width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M5 11L11 5M11 5H6M11 5V10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const sectionsEl = document.getElementById("sections");

    TOOLS.forEach((sec, i) => {
      const section = document.createElement("section");
      section.className = "block reveal";
      section.style.animationDelay = (0.12 + i * 0.06) + "s";

      const head = document.createElement("div");
      head.className = "block-head";
      const node = document.createElement("span");
      node.className = "node";
      node.textContent = String(i + 2).padStart(2, "0");
      const headText = document.createElement("div");
      headText.className = "block-head-text";
      const title = document.createElement("h2");
      title.className = "block-title";
      title.textContent = sec.section;
      headText.appendChild(title);
      if (sec.blurb) {
        const blurb = document.createElement("p");
        blurb.className = "blurb";
        blurb.textContent = sec.blurb;
        headText.appendChild(blurb);
      }
      head.appendChild(node);
      head.appendChild(headText);
      section.appendChild(head);

      const grid = document.createElement("div");
      grid.className = "grid";

      sec.items.forEach(item => {
        const hasUrl = item.url && item.url.trim() !== "";
        const isCta = !!item.cta && hasUrl;
        const tile = document.createElement(hasUrl ? "a" : "div");
        tile.className = "tile"
          + (isCta ? " cta" : "")
          + (hasUrl ? "" : (item.soon ? " unset is-soon" : " unset"));

        const top = document.createElement("div");
        top.className = "tile-top";
        const name = document.createElement("span");
        name.className = "tile-name";
        name.textContent = item.name;
        top.appendChild(name);

        if (hasUrl) {
          tile.href = item.url;
          tile.target = "_blank";
          tile.rel = "noopener";
          if (!isCta) top.insertAdjacentHTML("beforeend", ARROW);
        }
        tile.appendChild(top);

        if (!hasUrl) {
          const pill = document.createElement("span");
          pill.className = "pill" + (item.soon ? " soon" : "");
          pill.textContent = item.soon ? "Coming soon" : "Set link";
          tile.appendChild(pill);
        }

        if (item.desc) {
          const desc = document.createElement("div");
          desc.className = "tile-desc";
          desc.textContent = item.desc;
          tile.appendChild(desc);
        }

        if (isCta) {
          const go = document.createElement("span");
          go.className = "cta-go";
          go.textContent = (item.action || "Open") + "  \u2192";
          tile.appendChild(go);
        }

        grid.appendChild(tile);
      });

      section.appendChild(grid);
      sectionsEl.appendChild(section);
    });
  </script>
</body>
</html>
